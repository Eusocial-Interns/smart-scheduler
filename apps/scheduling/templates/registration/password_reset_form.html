{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Forgot Password — Eusocial</title>
    <link rel="stylesheet" href="{% static 'scheduling/css/base.css' %}">
    <style>
        html, body { height: 100%; overflow: hidden; }
        .login-page {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .login-logo {
            font-size: 1.45rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: var(--accent-deep);
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--radius-lg);
            padding: 2rem;
            box-shadow: var(--shadow);
        }
        .login-card h1 {
            font-size: 1.35rem;
            font-weight: 700;
            margin: 0 0 0.35rem;
            color: var(--ink);
        }
        .login-card .subtitle {
            font-size: 0.875rem;
            color: var(--muted);
            margin: 0 0 1.75rem;
        }
        .field {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            margin-bottom: 1rem;
        }
        .field label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--ink);
        }
        .field input {
            padding: 0.7rem 0.9rem;
            border: 1px solid var(--line);
            border-radius: var(--radius-sm);
            background: rgba(255,255,255,0.8);
            font-size: 0.95rem;
            color: var(--ink);
            font-family: inherit;
            outline: none;
            transition: border-color 150ms;
        }
        .field input:focus { border-color: var(--accent); }
        .field-errors { font-size: 0.8rem; color: #b4321e; margin-top: 0.2rem; }
        .login-actions {
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
            margin-top: 1.5rem;
        }
        .login-back {
            text-align: center;
            font-size: 0.85rem;
            color: var(--muted);
            text-decoration: none;
        }
        .login-back:hover { color: var(--accent-deep); }
        .watermark {
            color: var(--muted);
            font-size: 0.75rem;
            text-align: center;
            margin-top: 1rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>
<div class="login-page">
    <div class="login-logo">Eusocial</div>
    <div class="login-card">
        <h1>Forgot Password?</h1>
        <p class="subtitle">Enter your email and we'll send you a reset link.</p>

        <form method="post">
            {% csrf_token %}
            <div class="field">
                <label for="{{ form.email.id_for_label }}">Email Address</label>
                {{ form.email }}
                {% if form.email.errors %}
                <span class="field-errors">{{ form.email.errors|join:", " }}</span>
                {% endif %}
            </div>
            <div class="login-actions">
                <button class="button-primary" type="submit">Send Reset Link</button>
                <a href="{% url 'login' %}" class="login-back">Back to Sign In</a>
                <p class="watermark">Powered by Eusocial ©</p>
            </div>
        </form>
    </div>
</div>
</body>
</html>
