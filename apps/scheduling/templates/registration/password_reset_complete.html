{% extends 'scheduling/base.html' %}
{% load static %}

{% block title %}Password Reset Complete{% endblock %}

{% block page_css %}
<link rel="stylesheet" href="{% static 'scheduling/css/profile.css' %}">
{% endblock %}

{% block content %}
<section class="profile-page">
    <div class="profile-hero page-card">
        <div>
            <p class="section-eyebrow">Smart Scheduler</p>
            <h1 class="section-title">Password updated</h1>
            <p class="section-copy">Your password has been set. You can now sign in with your new password.</p>
        </div>
    </div>

    <section class="page-card profile-section">
        <div class="form-grid">
            <div class="field field--full">
                <a href="{% url 'login' %}" class="button-primary" style="text-align:center;text-decoration:none">Sign in</a>
            </div>
        </div>
    </section>
</section>
{% endblock %}
