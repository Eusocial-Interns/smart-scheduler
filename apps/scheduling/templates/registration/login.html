{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#f9f2e9">
    <title>Sign In — Smart Scheduler</title>
    <link rel="stylesheet" href="{% static 'scheduling/css/base.css' %}">
    <style>
        html {
            height: 100%;
            background-color: #efe5d8;
        }

        body {
            height: 100%;
            overflow: hidden;
            background-color: #efe5d8;
            background: linear-gradient(180deg, #f9f2e9 0%, #f4ecdf 45%, #efe5d8 100%);
        }

        .login-page {
            min-height: 100vh;
            overflow: hidden;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .login-logo {
            font-size: 1.45rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: var(--accent-deep);
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--radius-lg);
            padding: 2rem;
            box-shadow: var(--shadow);
        }

        .login-card h1 {
            font-size: 1.35rem;
            font-weight: 700;
            margin: 0 0 0.35rem;
            color: var(--ink);
        }

        .login-card p {
            font-size: 0.875rem;
            color: var(--muted);
            margin: 0 0 1.75rem;
        }

        .login-error {
            font-size: 0.85rem;
            color: #b4321e;
            background: rgba(180, 50, 30, 0.07);
            border-radius: var(--radius-sm);
            padding: 0.6rem 0.85rem;
            margin-bottom: 1rem;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            margin-bottom: 1rem;
        }

        .field label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--ink);
        }

        .field input {
            padding: 0.7rem 0.9rem;
            border: 1px solid var(--line);
            border-radius: var(--radius-sm);
            background: rgba(255,255,255,0.8);
            font-size: 0.95rem;
            color: var(--ink);
            font-family: inherit;
            outline: none;
            transition: border-color 150ms;
        }

        .field input:focus {
            border-color: var(--accent);
        }

        .login-actions {
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
            margin-top: 1.5rem;
        }

        .login-forgot {
            text-align: center;
            font-size: 0.85rem;
            color: var(--muted);
            text-decoration: none;
            margin-top: 1rem;
            margin-bottom: 1rem;
        }

        .login-forgot:hover {
            color: var(--accent-deep);
        }

        .watermark {
            color: var(--muted);
            font-size: 0.75rem;
            text-align: center;
            opacity: 0.7;
        }

    </style>
</head>
<body>
<div class="login-page">
    <div class="login-logo">SmartSchedule</div>

    <div class="login-card">
        <h1>Sign in</h1>

        <form method="post">
            {% csrf_token %}
            {% if form.non_field_errors %}
            <div class="login-error">{{ form.non_field_errors|join:", " }}</div>
            {% endif %}

            <div class="field">
                <label for="{{ form.username.id_for_label }}">Username</label>
                {{ form.username }}
            </div>

            <div class="field">
                <label for="{{ form.password.id_for_label }}">Password</label>
                {{ form.password }}
            </div>

            <div class="login-actions">
                <button class="button-primary" type="submit">Sign In</button>
                <a href="{% url 'password_reset' %}" class="login-forgot">Forgot your password?</a>
                <p class="watermark">Powered by Eusocial ©</p>
            </div>
        </form>
    </div>
</div>
<script>
    let lastTap = 0;
    document.addEventListener('touchmove', function(e) {
        if (e.touches.length > 1) e.preventDefault();
    }, { passive: false });
    document.addEventListener('touchend', function(e) {
        const now = Date.now();
        if (now - lastTap < 300) e.preventDefault();
        lastTap = now;
    }, { passive: false });
</script>
</body>
</html>
