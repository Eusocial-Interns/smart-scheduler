{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Password Updated — SmartSchedule</title>
    <link rel="stylesheet" href="{% static 'scheduling/css/base.css' %}">
    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .login-logo {
            font-size: 1.45rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: var(--accent-deep);
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--radius-lg);
            padding: 2rem;
            box-shadow: var(--shadow);
            text-align: center;
        }

        .success-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .login-card h1 {
            font-size: 1.35rem;
            font-weight: 700;
            margin: 0 0 0.5rem;
            color: var(--ink);
        }

        .login-card p {
            font-size: 0.875rem;
            color: var(--muted);
            margin: 0 0 1.75rem;
        }

        .login-actions {
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
        }

        .watermark {
            color: var(--muted);
            font-size: 0.75rem;
            text-align: center;
            margin-top: 1rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>
<div class="login-page">
    <div class="login-logo">SmartSchedule</div>

    <div class="login-card">
        <div class="success-icon">✓</div>
        <h1>Password Updated</h1>
        <p>Your password has been changed successfully.</p>

        <div class="login-actions">
            <a href="{% url 'profile' %}" class="button-primary">Back to Profile</a>
        </div>

        <p class="watermark">Powered by Eusocial ©</p>
    </div>
</div>
</body>
</html>
