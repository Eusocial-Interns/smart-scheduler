{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>{% block title %}Smart Scheduler{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'scheduling/css/base.css' %}?v=20260529">
    <link rel="stylesheet" href="{% static 'scheduling/css/nav_bar.css' %}?v=20260529">
    {% block page_css %}{% endblock %}
</head>
<body data-route="{{ request.resolver_match.url_name|default:'page' }}">
    <div class="app-shell">
        <header class="app-header">
            {% include 'scheduling/nav_bar.html' %}
        </header>
        <main class="app-main">
            {% block content %}{% endblock %}
        </main>
    </div>
    <script src="{% static 'scheduling/js/navbar.js' %}?v=20260519b"></script>
    <script>
    (function () {
        const badge = document.getElementById("nav-pending-badge");
        const badgeMobile = document.getElementById("nav-pending-badge-mobile");
        function updateBadge(count) {
            [badge, badgeMobile].forEach(el => {
                if (!el) return;
                if (count > 0) {
                    el.textContent = count > 99 ? "99+" : count;
                    el.hidden = false;
                } else {
                    el.hidden = true;
                }
            });
        }
        async function pollPending() {
            try {
                const r = await fetch("/api/v1/pending-count/", { credentials: "same-origin" });
                if (r.ok) {
                    const data = await r.json();
                    updateBadge(data.count || 0);
                }
            } catch (_) {}
        }
        pollPending();
        setInterval(pollPending, 60000);
        document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === "visible") pollPending();
        });
    })();
    </script>
    <div class="status-banner" id="app-toast"></div>
    {% block page_js %}{% endblock %}
</body>
</html>
