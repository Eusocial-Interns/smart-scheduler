<html><head>
  <style>
    body { 
    font-family: 'Segoe UI', 
    Tahoma, Geneva, 
    Verdana, sans-serif; 
    padding: 20px; 
    color: #333; 
    background: #f4f7f6; 
}

.container { max-width: 1100px; 
        margin: 0 auto; 
        background: white; 
        padding: 30px; 
        border-radius: 8px; 
        box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
}
    
.status-banner { 
      padding: 15px 25px; 
      margin-bottom: 25px; 
      border-radius: 6px; 
      display: flex; 
      justify-content: 
      space-between; 
      align-items: center;
      transition: all 0.3s ease;
}

.draft-banner { 
        background: #fffaf0; 
        border: 1px solid #fbd38d; 
        color: #7b341e; 
}

.published-banner { 
        background: #f0fff4; 
        border: 1px solid #9ae6b4; 
        color: #22543d; 
}
    
.publish-btn { 
        background: #7b341e; 
        color: white; 
        padding: 10px 20px; 
        border: none; 
        border-radius: 5px; 
        cursor: pointer; 
        font-weight: 600; 
}

.unpublish-link { 
    color: #e53e3e; 
    cursor: pointer; 
    font-size: 0.85rem; 
    text-decoration: underline; 
    margin-left: 15px; 
}

.nav-bar-week { 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    margin-bottom: 20px; 
}

.nav-btn-week { 
    background: #edf2f7; 
    border: 1px solid #cbd5e0; 
    padding: 6px 12px; 
    border-radius: 4px; 
    cursor: pointer; 
}
.date-header { 
    font-size: 1.2rem; 
    font-weight: 700; 
    color: #2d3748; 
}

.schedule-table { 
    width: 100%; 
    border-collapse: collapse; 
    table-layout: fixed; 
}
.schedule-table th, .schedule-table td { 
    border: 1px solid #e2e8f0; 
    padding: 12px; 
    vertical-align: top; 
}
.role-col { 
    background: #f8fafc; 
    font-weight: bold; 
    width: 120px; 
}

[data-coverage="under"] { 
    background: #fff5f5; 
    border-top: 3px solid #e53e3e; 
}

[data-coverage="full"] { 
    background: #ffffff; 
}
    
.badge { 
    font-size: 0.7rem; 
    font-weight: 800; 
    padding: 2px 6px; 
    border-radius: 4px; 
    display: inline-block; 
    margin-top: 8px; 
}
.badge-red { 
    background: #feb2b2; 
    color: #9b2c2c; 
}
.badge-green { 
    background: #c6f6d5; 
    color: #22543d; 
}

.staff-name { 
    font-size: 0.85rem; 
    color: #4a5568; 
    min-height: 1.2em; 
}

.published-mode .schedule-table { 
    border: 2px solid #38a169; 
}
  </style>
</head>

<div class="container" id="mainContainer">
  
  <div id="statusBanner" class="status-banner draft-banner">
    <div>
      <strong>Status: <span id="statusLabel">DRAFT</span></strong>
      <div id="statusSubtext" style="font-size: 0.8rem; opacity: 0.8;">Visible to managers only.</div>
    </div>
    <div>
      <button class="publish-btn" id="actionBtn" onclick="togglePublish()">Publish Week</button>
      <span id="unpublishArea" style="display:none;" onclick="togglePublish()" class="unpublish-link">Set to Draft</span>
    </div>
  </div>

  
  <div class="nav-bar-week">
    <button class="nav-btn-week" onclick="changeWeek(-7)">◀ Previous Week</button>
    <div class="date-header" id="dateHeading">Loading...</div>
    <button class="nav-btn-week" onclick="changeWeek(7)">Next Week ▶</button>
  </div>

  
  <table class="schedule-table">
    <thead>
      <tr>
        <th class="role-col">Role</th>
        <th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th><th>Sun</th>
      </tr>
    </thead>
    <tbody id="scheduleBody"></tbody>
  </table>
</div>
<script>
let currentState = "draft";
let currentSchedule = [];
let weekOffset = 0;

async function loadSchedule() {
  const res = await fetch('/api/schedule');
  const data = await res.json();

  currentState = data.publishState;
  currentSchedule = data.schedule;

  updateBanner();
  renderTable();
}

function transformSchedule(schedule) {
  const roleMap = {};

  schedule.forEach(dayObj => {
    const day = dayObj.day;

    dayObj.roles.forEach(roleObj => {
      const role = roleObj.role;

      if (!roleMap[role]) {
        roleMap[role] = {};
      }

      roleMap[role][day] = roleObj;
    });
  });

  return roleMap;
}


function renderTable() {
  const tbody = document.getElementById('scheduleBody');
  tbody.innerHTML = '';

  const roleMap = transformSchedule(currentSchedule);
  const days = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];

  Object.keys(roleMap).forEach(role => {
    const tr = document.createElement('tr');

    
    const roleTd = document.createElement('td');
    roleTd.textContent = role;
    roleTd.classList.add('role-col');
    tr.appendChild(roleTd);

    
    days.forEach(day => {
      const td = document.createElement('td');

      const roleData = roleMap[role][day];

      if (roleData) {
        const input = document.createElement('input');

        input.value = roleData.assigned.join(', ');

        
        if (currentState === 'published') {
          input.disabled = true;
        }

        input.onchange = (e) => {
          const names = e.target.value
            .split(',')
            .map(n => n.trim())
            .filter(n => n !== '');

          roleData.assigned = names;
          saveSchedule();
        };

        td.appendChild(input);

        
        td.classList.add(roleData.status);

        
        const small = document.createElement('div');
        small.style.fontSize = '0.7rem';
        small.innerText = `Req: ${roleData.required}`;
        td.appendChild(small);

      } else {
        td.innerText = "-";
      }

      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });
}

async function saveSchedule() {
  await fetch('/api/schedule/update', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ schedule: currentSchedule })
  });

  loadSchedule();
}

function updateBanner() {
  const label = document.getElementById('statusLabel');
  const subtext = document.getElementById('statusSubtext');
  const btn = document.getElementById('actionBtn');
  const unpublish = document.getElementById('unpublishArea');
  const banner = document.getElementById('statusBanner');

  if (currentState === 'published') {
    label.innerText = "PUBLISHED";
    subtext.innerText = "Visible to all employees.";

    banner.classList.remove('draft-banner');
    banner.classList.add('published-banner');

    btn.style.display = "none";
    unpublish.style.display = "inline";
  } else {
    label.innerText = "DRAFT";
    subtext.innerText = "Visible to managers only.";

    banner.classList.remove('published-banner');
    banner.classList.add('draft-banner');

    btn.style.display = "inline";
    unpublish.style.display = "none";
  }
}

async function togglePublish() {
  const newState = currentState === "draft" ? "published" : "draft";

  const res = await fetch('/api/schedule/publish', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ publishState: newState })
  });

  if (!res.ok) {
    const err = await res.json();
    alert(err.error);
    return;
  }

  loadSchedule();
}

function changeWeek(days) {
  weekOffset += days;

  const heading = document.getElementById('dateHeading');
  heading.innerText = `Week Offset: ${weekOffset} days`;

  
}


window.onload = loadSchedule;
</script>
</html>
