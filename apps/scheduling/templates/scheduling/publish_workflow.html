<!DOCTYPE html>
<html>
<head>
  <title>Weekly Schedule - Full Stack Master</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; color: #333; background: #f4f7f6; }
    .container { max-width: 1100px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    
    /* Workflow Banner */
    .status-banner { 
      padding: 15px 25px; margin-bottom: 25px; border-radius: 6px; 
      display: flex; justify-content: space-between; align-items: center;
      transition: all 0.3s ease;
    }
    .draft-banner { background: #fffaf0; border: 1px solid #fbd38d; color: #7b341e; }
    .published-banner { background: #f0fff4; border: 1px solid #9ae6b4; color: #22543d; }
    
    .publish-btn { background: #2d3748; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: 600; }
    .publish-btn:hover { background: #1a202c; }
    .unpublish-link { color: #e53e3e; cursor: pointer; font-size: 0.85rem; text-decoration: underline; margin-left: 15px; }

    /* Navigation */
    .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .nav-btn { background: #edf2f7; border: 1px solid #cbd5e0; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
    .date-header { font-size: 1.2rem; font-weight: 700; color: #2d3748; }

    /* Schedule Grid & Indicators */
    .schedule-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    .schedule-table th, .schedule-table td { border: 1px solid #e2e8f0; padding: 12px; vertical-align: top; }
    .role-col { background: #f8fafc; font-weight: bold; width: 120px; }

    /* Coverage States */
    [data-coverage="under"] { background: #fff5f5; border-top: 3px solid #e53e3e; }
    [data-coverage="full"] { background: #ffffff; }
    
    .badge { font-size: 0.7rem; font-weight: 800; padding: 2px 6px; border-radius: 4px; display: inline-block; margin-top: 8px; }
    .badge-red { background: #feb2b2; color: #9b2c2c; }
    .badge-green { background: #c6f6d5; color: #22543d; }

    .staff-name { font-size: 0.85rem; color: #4a5568; min-height: 1.2em; }
    .published-mode .schedule-table { border: 2px solid #38a169; }
  </style>
</head>
<body>

<div class="container" id="mainContainer">
  <!-- Status Banner -->
  <div id="statusBanner" class="status-banner draft-banner">
    <div>
      <strong>Status: <span id="statusLabel">DRAFT</span></strong>
      <div id="statusSubtext" style="font-size: 0.8rem; opacity: 0.8;">Visible to managers only.</div>
    </div>
    <div>
      <button class="publish-btn" id="actionBtn" onclick="togglePublish()">Publish Week</button>
      <span id="unpublishArea" style="display:none;" onclick="togglePublish()" class="unpublish-link">Set to Draft</span>
    </div>
  </div>

  <!-- Navigation Controls -->
  <div class="nav-bar">
    <button class="nav-btn" onclick="changeWeek(-7)">◀ Previous Week</button>
    <div class="date-header" id="dateHeading">Loading...</div>
    <button class="nav-btn" onclick="changeWeek(7)">Next Week ▶</button>
  </div>

  <!-- Schedule Table -->
  <table class="schedule-table">
    <thead>
      <tr>
        <th class="role-col">Role</th>
        <th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th><th>Sun</th>
      </tr>
    </thead>
    <tbody id="scheduleBody"></tbody>
  </table>
</div>

<script>
  let isPublished = false;
  let currentMonday = getMonday(new Date());

  // Mock data - in a real app, you'd fetch this based on currentMonday
  const scheduleData = [
    { 
      role: 'Lead Dev', target: 1, 
      days: [
        { staff: 'Alex', current: 1 }, { staff: 'Alex', current: 1 }, 
        { staff: 'Alex', current: 1 }, { staff: 'Alex', current: 1 }, 
        { staff: 'Alex', current: 1 }, { staff: '--', current: 0 }, { staff: '--', current: 0 }
      ] 
    },
    { 
      role: 'Support', target: 2, 
      days: [
        { staff: 'Jordan, Sam', current: 2 }, { staff: 'Jordan', current: 1 }, 
        { staff: 'Jordan, Sam', current: 2 }, { staff: 'Jordan', current: 1 }, 
        { staff: 'Jordan, Sam', current: 2 }, { staff: 'Sam', current: 1 }, { staff: '--', current: 0 }
      ] 
    }
  ];

  function getMonday(d) {
    d = new Date(d);
    let day = d.getDay(),
        diff = d.getDate() - day + (day == 0 ? -6 : 1); 
    return new Date(d.setDate(diff));
  }

  function formatDateRange(monday) {
    const sunday = new Date(monday);
    sunday.setDate(monday.getDate() + 6);
    const options = { month: 'short', day: 'numeric' };
    return `${monday.toLocaleDateString(undefined, options)} – ${sunday.toLocaleDateString(undefined, options)}, ${sunday.getFullYear()}`;
  }

  function render() {
    const body = document.getElementById('scheduleBody');
    const container = document.getElementById('mainContainer');
    const banner = document.getElementById('statusBanner');
    const actionBtn = document.getElementById('actionBtn');
    
    // Update Publish Status
    if (isPublished) {
      container.classList.add('published-mode');
      banner.className = "status-banner published-banner";
      document.getElementById('statusLabel').innerText = "PUBLISHED";
      document.getElementById('unpublishArea').style.display = "inline";
      actionBtn.innerText = "Export PDF"; 
    } else {
      container.classList.remove('published-mode');
      banner.className = "status-banner draft-banner";
      document.getElementById('statusLabel').innerText = "DRAFT";
      document.getElementById('unpublishArea').style.display = "none";
      actionBtn.innerText = "Publish Week";
    }

    // Update Navigation Header
    document.getElementById('dateHeading').innerText = formatDateRange(currentMonday);

    // Render Table Content
    body.innerHTML = '';
    scheduleData.forEach(rowItem => {
      const tr = document.createElement('tr');
      let html = `<td class="role-col">${rowItem.role}</td>`;
      
      rowItem.days.forEach(day => {
        const isUnder = day.current < rowItem.target;
        html += `
          <td data-coverage="${isUnder ? 'under' : 'full'}">
            <div class="staff-name">${day.staff}</div>
            <span class="badge ${isUnder ? 'badge-red' : 'badge-green'}">
              ${isUnder ? '⚠' : '✓'} ${day.current}/${rowItem.target}
            </span>
          </td>`;
      });
      tr.innerHTML = html;
      body.appendChild(tr);
    });
  }

  function changeWeek(days) {
    currentMonday.setDate(currentMonday.getDate() + days);
    render();
  }

  function togglePublish() {
    isPublished = !isPublished;
    render();
  }

  render();
</script>
</body>
</html>
