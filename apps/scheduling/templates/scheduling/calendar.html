{% load static %}
<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{% static 'scheduling/css/calendar.css' %}">
    <title>Calendar</title>
</head>

<body>
    <!-- Nav Bar -->
    <div id="navbar">{% include 'scheduling/nav_bar.html' %}</div>
    <script src="{% static 'scheduling/js/nav_bar.js' %}"></script>
    <!-- Profile Content-->
    <div class = "wrapper">
        <h1 id="monthAndYear"></h1>
        <div class="button-container-calendar">
                <button id="previous" onclick="previous()"> <
                </button>
                <button id="next" onclick="next()"> >
                </button>
            </div>
        <div class = "container-calendar">
            <table class="table-calendar" id="calendar" data-lang="en">
                <thead id="thead-month"></thead>
                <tbody id="calendar-body"></tbody>
            </table>
            <div class="footer-container-calendar">
                <label for="month">Jump To: </label>
                <p></p>
                <select id="month" onchange="jump()">
                    <option value=0>Jan</option>
                    <option value=1>Feb</option>
                    <option value=2>Mar</option>
                    <option value=3>Apr</option>
                    <option value=4>May</option>
                    <option value=5>Jun</option>
                    <option value=6>Jul</option>
                    <option value=7>Aug</option>
                    <option value=8>Sep</option>
                    <option value=9>Oct</option>
                    <option value=10>Nov</option>
                    <option value=11>Dec</option>
                </select>
                <select id="year" onchange="jump()"></select>
            </div>
        </div>
        <div id="event-section">
            <h3>Add Shift</h3>
            <input type="date" id="eventDate">
            <input type="time" id="eventStartTime">
            <input type="time" id="eventEndTime">
            <select id="employee" >
                <option value="">Select employee</option>
                <option value="0">Elizabeth</option>
                <option value="1">Mohammad</option>
                <option value="2">Stephen</option>
            </select>
            <select id="position">
                <option value="">Select position</option>
                <option value="0">Server</option>
                <option value="1">Busser</option>
                <option value="2">Cook</option>
            </select>
            <input type="text" id="eventTitle" placeholder="Notes">
            <button id="addEvent" onclick="addEvent()">Add</button>
        </div>
        
    </div>
    <script src="{% static 'scheduling/js/calendar.js' %}"></script>
</body>

</html>
