{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <!--<link rel="stylesheet" href="{% static 'scheduling/css/chat.css' %}">-->
</head>
<style>
.content {
   display: flex;
   flex-direction: column;
}

.content h1 {
   align-self: center;
}
.conversationList {
   display: flex;
   flex-direction: row;
   width: 100%; 
}
.listPanel {
   border: 1px solid;
   width: 85%;
   height: 100%;    
}
.listPanel input {
   font-size: 25px;
   margin: 5px;
}
.messageContent {
   display: flex;
   flex-direction: row;
}
.message {
   display: flex;
   flex-direction: column;
   line-height: 0px; 
}
.avatar {
   display: flex;
   align-items: center;
   justify-content: center;
   width: 60px;
   height: 60px;
   background-color: lightgray;
   color: white;
   font-size: 24px;
   border-radius: 50%; 
}
.messagePanel {
   width: 100%;
   height: 100%;
   border: 1px solid;
}
.currentAvatar {
   display: flex;
   flex-direction: column;
   align-items: center;
}

.conversation {
  display: flex;
  flex-direction: column;
  margin-top: 250px;
  gap: 10px;
}
.bubble {
  max-width: 75%;
  padding: 5px 7px;
  border-radius: 18px;
  font-size: 20px;
  line-height: 1;
}
.messageReceived {
   align-self: flex-start;
   background-color: lightgray;
   font-style: bold;
}
.messageSent {
   align-self: flex-end;
   background-color: #fbb54c;
   font-style: bold;
}
.messageInput {
   margin-top: 40px;
}
.messageInput input {
   font-size: 28px;
   padding: 10px;
   background-color: lightgray;
   color: black;
}
.messageInput button {
   font-size: 30px;
   padding: 0 20px;
   cursor: pointer;
   background-color: #ffa31a;
}
.messageInput button:hover {
   background-color: #fbb54c;
   color:white;
}
/* Mobile Screen */
@media (max-width: 768px) {
   .messageInput {
   margin-top: 20px;
}
.messageInput input {
   font-size: 14px;
}
.messageInput button {
   font-size: 14px;
}  
}
</style>
<body>
<!-- Nav Bar -->
<div id="navbar">{% include 'scheduling/nav_bar.html' %}</div>
<!--<script src="{% static 'scheduling/js/navbar.js' %}"></script>-->
<!-- Chat Content-->
<div class="content">
    <h1>Chat</h1>
    <div class="conversationList">
        <div class="listPanel">
            <input type="text" class="placeholder" placeholder="Search">
            <div class="messageContent">
                <div class="avatar">
                    G
                </div>
                <div class="message">
                    <h2>Guest</h2>
                    <p>Message.</p>
                </div>
            </div>  
        </div>
        <div class="messagePanel">
            <div class="currentAvatar">
                <div class="avatar">
                    G
                </div>
                <h2>Guest</h2>
            </div>
            <div class="conversation">
                <div class="bubble messageReceived">
                    <p>Message.</p>
                </div>
                <div class="bubble messageSent">
                    <p>Response.</p>
                </div>

                <div class="messageInput">
                    <form method="POST" style="display: flex; width: 100%;">
                        {% csrf_token %}
                        <input type="text" name="message" class="placeholder" placeholder="Type Message">
                        <button type="submit" class="send-button">Send</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
